name: Update project context

on:
  workflow_dispatch:

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run context:update
      - name: Commit context update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update project context"
          file_pattern: context.md
